<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Suhani 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #70c5ce;
    font-family: 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    touch-action: none;
  }
  #gameWrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    overflow: hidden;
    border-radius: 16px;
  }
  canvas { display: block; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: transparent;
    color: #fff; text-align: center; padding: 24px;
    z-index: 10;
  }
  .overlay.hidden { display: none; }

  .title {
    font-size: 38px; font-weight: 900;
    background: linear-gradient(135deg, #f5c542, #e07b00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 14px; color: #d8b4fe; margin-bottom: 28px; letter-spacing: 2px;
  }
  .btn {
    width: 220px; padding: 14px 0;
    margin: 8px auto; border-radius: 50px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; border: none;
    transition: transform .15s, box-shadow .15s;
    letter-spacing: 1px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-gold {
    background: linear-gradient(135deg, #f5c542, #e07b00);
    color: #1a0533;
    box-shadow: 0 4px 20px #f5c54260;
  }
  .btn-purple {
    background: linear-gradient(135deg, #9333ea, #6d28d9);
    color: #fff;
    box-shadow: 0 4px 20px #9333ea60;
  }
  .btn-outline {
    background: transparent;
    color: #f5c542;
    border: 2px solid #f5c542;
    box-shadow: none;
  }

  /* Name Popup */
  #namePopup {
    position: absolute; inset: 0;
    background: #1a0533f0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; padding: 32px;
  }
  #namePopup .popup-box {
    background: linear-gradient(160deg, #2d0a5f, #3b1278);
    border-radius: 20px; padding: 36px 28px;
    border: 1.5px solid #9333ea66;
    width: 100%; max-width: 320px;
    box-shadow: 0 8px 40px #9333ea44;
  }
  #namePopup h2 { font-size: 26px; color: #f5c542; margin-bottom: 6px; }
  #namePopup p { font-size: 13px; color: #d8b4fe; margin-bottom: 22px; }
  #nameInput {
    width: 100%; padding: 12px 16px;
    border-radius: 12px; border: 1.5px solid #9333ea;
    background: #1a0533; color: #fff;
    font-size: 16px; outline: none;
    margin-bottom: 18px;
  }
  #nameInput::placeholder { color: #7c4fa0; }

  /* Bird Selector */
  #birdSelector {
    background: #1a0533f0;
    padding: 24px;
  }
  #birdSelector h2 { font-size: 22px; color: #f5c542; margin-bottom: 6px; }
  #birdSelector p { font-size: 13px; color: #d8b4fe; margin-bottom: 20px; }
  .bird-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-bottom: 20px;
  }
  .bird-option {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
  }
  .bird-option img {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid #6d28d9;
    transition: border-color .2s, transform .2s;
    object-fit: cover;
  }
  .bird-option:hover img, .bird-option.selected img {
    border-color: #f5c542;
    transform: scale(1.1);
  }
  .bird-option span { font-size: 11px; color: #d8b4fe; margin-top: 6px; }

  /* Leaderboard */
  #leaderboardScreen h2 { font-size: 26px; color: #f5c542; margin-bottom: 18px; }
  .lb-table {border-radius: 10px; width: 100%; border-collapse: collapse; margin-bottom: 20px; background: rgba(255,255,255,0.75);}
  .lb-table th { color: #f5c542; font-size: 12px; padding: 6px 10px; border-bottom: 1px solid #9333ea44; text-align: left; }
  .lb-table td { color: #000; font-weight: 600; font-size: 14px; padding: 8px 10px; border-bottom: 1px solid #9333ea22; }
  .lb-table tr:first-child td { color: #f5c542; font-weight: 700; }
  .medal { font-size: 16px; }

  /* Game Over */
  #gameOverScreen h2 { font-size: 34px; color: #f5c542; margin-bottom: 4px; }
  .score-big { font-size: 64px; font-weight: 900; color: #fff; line-height: 1; margin: 10px 0; }
  .pb-line { font-size: 13px; color: #d8b4fe; margin-bottom: 24px; }

  /* Score HUD */
  #scoreHud {
    position: absolute; top: 16px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 5; pointer-events: none;
  }
  #scoreHud span {
    font-size: 42px; font-weight: 900; color: #fff;
    text-shadow: 0 2px 8px #00000080, 0 0 12px #9333ea;
    letter-spacing: 2px;
  }

  /* Confetti burst */
  .confetti-dot {
    position: absolute; border-radius: 50%;
    pointer-events: none; z-index: 20;
    animation: confettiFall 1s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(120px) scale(0.3); opacity: 0; }
  }

  @media (max-height: 640px) {
    #gameWrapper { width: 320px; height: 480px; }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="400" height="600"></canvas>

  <!-- Score HUD -->
  <div id="scoreHud" class="hidden">
    <span id="scoreDisplay">0</span>
  </div>

  <!-- Name Popup -->
  <div id="namePopup">
    <div class="popup-box">
      <h2>🎂 Happy Birthday!</h2>
      <p>Enter your name to play</p>
      <input id="nameInput" type="text" placeholder="Your name..." maxlength="20" autocomplete="off" />
      <button class="btn btn-gold" style="width:100%" onclick="submitName()">Let's Play! 🎉</button>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="mainMenu" class="overlay hidden">
    <div class="title">Flappy Suhani</div>
    <div id="menuBirdPreview" style="width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid #f5c542;margin:0 auto 24px;animation:birdFloat 1.2s ease-in-out infinite alternate;">
      <img id="menuBirdImg" src="images/bird1.png" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.style.background='#9333ea';this.style.display='none'">
    </div>
    <button class="btn btn-gold" onclick="startGame()">▶ START</button>
    <button class="btn btn-purple" onclick="showBirdSelector()">🐦 CHOOSE SUHANI</button>
    <button class="btn btn-outline" onclick="showLeaderboard()">🏆 LEADERBOARD</button>
    <div style="font-size:12px;color:#7c4fa0;margin-top:16px;" id="welcomeMsg"></div>
  </div>

  <!-- Bird Selector -->
  <div id="birdSelector" class="overlay hidden">
    <h2>Choose Your Suhani</h2>
    <p>Pick a photo to fly with!</p>
    <div class="bird-grid" id="birdGrid"></div>
    <button class="btn btn-gold" onclick="confirmBird()">✓ Choose This One!</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="showScreen('mainMenu')">← Back</button>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboardScreen" class="overlay hidden">
    <h2>🏆 Leaderboard</h2>
    <table class="lb-table" id="lbTable"></table>
    <button class="btn btn-outline" onclick="showScreen('mainMenu')">← Back</button>
  </div>

  <!-- Game Over -->
  <div id="gameOverScreen" class="overlay hidden">
    <h2>💀 Game Over</h2>
    <div class="score-big" id="finalScore">0</div>
    <div class="pb-line" id="pbLine">Personal best: 0</div>
    <button class="btn btn-gold" onclick="startGame()">▶ Play Again</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="showScreen('mainMenu')">🏠 Menu</button>
  </div>
</div>

<style>
  @keyframes birdFloat {
    from { transform: translateY(0px); }
    to { transform: translateY(-10px); }
  }
</style>

<audio id="musicAudio" loop></audio>
<audio id="deathAudio"></audio>
<audio id="pointAudio"></audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeGame() {
  const wrapper = document.getElementById('gameWrapper');

  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}

window.addEventListener('resize', resizeGame);
resizeGame();

// Audio
const music = document.getElementById('musicAudio');
const deathSfx = document.getElementById('deathAudio');
const pointSfx = document.getElementById('pointAudio');
music.src = 'sounds/music.mp3';
deathSfx.src = 'sounds/death.mp3';
pointSfx.src = 'sounds/point.mp3';

// State
let playerName = '';
let selectedBird = 1;
let tempBird = 1;
let gameRunning = false;
let animFrame = null;

// Bird
const bird = {
  x: 90, y: 250, vy: 0,
  radius: 28,
  flapStrength: -5.5,
  gravity: 0.20,
  maxFall: 6,
  wobble: 0,
};

// Pillars
const PILLAR_W = 90;
const HITBOX_W = 40;
const GAP = 220;
const PILLAR_SPEED = 1.3;
let pillars = [];
let score = 0;
let bestScore = 0;
let frame = 0;

// Images
const bgImg = new Image();
bgImg.src = 'images/background.png';
const pillarImg = new Image();
pillarImg.src = 'images/pillar.png';

const birdImages = {};
for (let i = 1; i <= 6; i++) {
  const img = new Image();
  img.src = `images/bird${i}.png`;
  birdImages[i] = img;
}

// Background scroll
let bgOffset = 0;

// ─── Screens ────────────────────────────────────────
function showScreen(id) {
  ['mainMenu','birdSelector','leaderboardScreen','gameOverScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function submitName() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) { document.getElementById('nameInput').focus(); return; }
  playerName = n;
  document.getElementById('namePopup').style.display = 'none';
  document.getElementById('welcomeMsg').textContent = `Hi ${playerName}! 🎉`;
  showScreen('mainMenu');
  loadBest();
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

function loadBest() {
  const lb = getLeaderboard();
  const me = lb.find(e => e.name === playerName);
  bestScore = me ? me.score : 0;
}

const birdNames = [
  "GanjiTAAT😈",
  "WTF-IS-THIS☠️",
  "Chutadasaur🦖",
  "FinalBoss💪",
  "SotaLomda🦊",
  "SocietyKaUncle"
];

// ─── Bird Selector ───────────────────────────────────
function showBirdSelector() {
  showScreen('birdSelector');
  tempBird = selectedBird;
  const grid = document.getElementById('birdGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const div = document.createElement('div');
    div.className = 'bird-option' + (i === tempBird ? ' selected' : '');
    div.innerHTML = `<img src="images/bird${i}.png" alt="${birdNames[i-1]}" onerror="this.style.background='hsl(${i*60},70%,50%)'">
                    <span>${birdNames[i-1]}</span>`;
    div.onclick = () => {
      document.querySelectorAll('.bird-option').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      tempBird = i;
    };
    grid.appendChild(div);
  }
}

function confirmBird() {
  selectedBird = tempBird;
  document.getElementById('menuBirdImg').src = `images/bird${selectedBird}.png`;
  showScreen('mainMenu');
}

// ─── Leaderboard ────────────────────────────────────
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('flappySuhaniLB') || '[]'); }
  catch(e) { return []; }
}

function saveLeaderboard(lb) {
  localStorage.setItem('flappySuhaniLB', JSON.stringify(lb));
}

function addScore(name, sc) {
  let lb = getLeaderboard();
  const idx = lb.findIndex(e => e.name === name);
  if (idx >= 0) { if (sc > lb[idx].score) lb[idx].score = sc; }
  else lb.push({ name, score: sc });
  lb.sort((a, b) => b.score - a.score);
  lb = lb.slice(0, 10);
  saveLeaderboard(lb);
  return lb;
}

function showLeaderboard() {
  showScreen('leaderboardScreen');
  const lb = getLeaderboard();
  const medals = ['🥇','🥈','🥉'];
  const table = document.getElementById('lbTable');
  table.innerHTML = `<tr><th>#</th><th>Player</th><th>Score</th></tr>`;
  if (!lb.length) {
    table.innerHTML += `<tr><td colspan="3" style="color:#7c4fa0;text-align:center;padding:20px">No scores yet — play first!</td></tr>`;
  }
  lb.forEach((entry, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${medals[i] || (i+1)}</td><td>${entry.name}</td><td>${entry.score}</td>`;
    if (entry.name === playerName) tr.style.background = '#f5c54218';
    table.appendChild(tr);
  });
}

// ─── Game Core ──────────────────────────────────────
function resetGame() {
  pillars = [];
  score = 0;
  frame = 0;
  bgOffset = 0;

  bird.x = canvas.width * 0.25;
  bird.y = canvas.height * 0.45;
  bird.vy = 0;
  bird.wobble = 0;

  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('scoreHud').classList.remove('hidden');

  spawnPillar();

  // Move first pillar closer
  pillars[0].x = canvas.width * 0.7;
}

function spawnPillar() {
  const minTop = 70;
  const maxTop = canvas.height - GAP - 80;

  const topH =
    Math.random() * (maxTop - minTop) + minTop;

  pillars.push({
    x: canvas.width + 100,
    topH,
    scored: false
  });
}

function flap() {
  if (!gameRunning) return;
  bird.vy = bird.flapStrength;
  bird.wobble = 1;
}

function startGame() {
  console.log("Trying to play music");
  music.play()
    .then(() => console.log("Music playing"))
    .catch(err => console.error("Music failed:", err));
  if (animFrame) cancelAnimationFrame(animFrame);
  showScreen('mainMenu');
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('scoreHud').classList.remove('hidden');
  resetGame();
  gameRunning = true;
  music.volume = 0.4;
  music.currentTime = 0;
  music.play().catch(() => {});
  gameLoop();
}

function gameOver() {
  if (!gameRunning) return;
  gameRunning = false;
  music.pause();
  deathSfx.currentTime = 0;
  deathSfx.play().catch(() => {});

  const lb = addScore(playerName, score);
  const me = lb.find(e => e.name === playerName);
  bestScore = me ? me.score : score;

  document.getElementById('finalScore').textContent = score;
  document.getElementById('pbLine').textContent = `Personal best: ${bestScore}`;
  document.getElementById('scoreHud').classList.add('hidden');
  showScreen('gameOverScreen');
  burstConfetti();
}

// ─── Drawing ────────────────────────────────────────
function drawBackground() {
  if (!bgImg.complete) return;

  const scale = Math.max(
    canvas.width / bgImg.width,
    canvas.height / bgImg.height
  );

  const w = bgImg.width * scale;
  const h = bgImg.height * scale;

  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2;

  ctx.drawImage(bgImg, x, y, w, h);
}

function drawPillars() {
  pillars.forEach(p => {
    if (pillarImg.complete && pillarImg.naturalWidth) {
      // Top pillar (flipped)
      ctx.save();
      ctx.translate(p.x + PILLAR_W/2, p.topH/2);
      ctx.scale(1, -1);
      ctx.drawImage(pillarImg, -PILLAR_W/2, -p.topH/2, PILLAR_W, p.topH);
      ctx.restore();
      // Bottom pillar
      const botY = p.topH + GAP;
      const botH = canvas.height - botY;
      ctx.drawImage(pillarImg, p.x, botY, PILLAR_W, botH);
    } else {
      // Fallback pillars
      ctx.fillStyle = '#6d28d9';
      ctx.fillRect(p.x, 0, PILLAR_W, p.topH);
      ctx.fillRect(p.x, p.topH + GAP, PILLAR_W, canvas.height);
      ctx.fillStyle = '#9333ea';
      ctx.fillRect(p.x - 4, p.topH - 16, PILLAR_W + 8, 16);
      ctx.fillRect(p.x - 4, p.topH + GAP, PILLAR_W + 8, 16);
    }
  });
}

function drawBird() {
  const img = birdImages[selectedBird];
  const r = bird.radius;
  const bob = Math.sin(frame * 0.08) * 3 * (gameRunning ? 0 : 1);
  const angle = Math.max(-0.4, Math.min(0.4, bird.vy * 0.06));

  ctx.save();
  ctx.translate(bird.x, bird.y + bob);
  ctx.rotate(angle);

  // Glow ring
  ctx.beginPath();
  ctx.arc(0, 0, r + 4, 0, Math.PI * 2);
  ctx.strokeStyle = '#f5c54280';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Clip circle
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.clip();

  if (img && img.complete && img.naturalWidth) {
    ctx.drawImage(img, -r, -r, r*2, r*2);
  } else {
    ctx.fillStyle = '#9333ea';
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(8, -5, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(10, -5, 3.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  // Birthday sparkles in background
  ctx.fillStyle = '#f5c54240';
  for (let i = 0; i < 5; i++) {
    const x = ((frame * (1+i*0.3) * 0.7) % (canvas.width + 20)) - 10;
    const y = (Math.sin(frame * 0.05 + i * 2) * 50) + (80 + i * 100);
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI*2);
    ctx.fill();
  }
}

// ─── Physics & Collision ────────────────────────────
function update() {
  frame++;

  // Bird physics
  bird.vy = Math.min(bird.vy + bird.gravity, bird.maxFall);
  bird.y += bird.vy;
  bird.wobble *= 0.85;

  // Ceiling & floor
  if (bird.y - bird.radius < 0) { bird.y = bird.radius; bird.vy = 1; }
  if (bird.y + bird.radius > canvas.height) { gameOver(); return; }

  // Pillars
  const toRemove = [];
  pillars.forEach((p, idx) => {
    p.x -= PILLAR_SPEED;

    // Score
    if (!p.scored && p.x + PILLAR_W < bird.x) {
      p.scored = true;
      score++;
      document.getElementById('scoreDisplay').textContent = score;
      pointSfx.currentTime = 0;
      pointSfx.play().catch(() => {});
    }

    // Collision
    const bx = bird.x, by = bird.y, br = bird.radius - 4;
    const hitboxX = p.x + (PILLAR_W - HITBOX_W)/2;
    const inX = bx + br > hitboxX && bx - br < hitboxX + HITBOX_W;
    if (inX && (by - br < p.topH || by + br > p.topH + GAP)) {
      gameOver(); return;
    }

    if (p.x + PILLAR_W < -10) toRemove.push(idx);
  });
  toRemove.reverse().forEach(i => pillars.splice(i, 1));

  // Spawn new pillar
  if (pillars.length === 0 || pillars[pillars.length-1].x < canvas.width - 220) {
    spawnPillar();
  }
}

// ─── Game Loop ──────────────────────────────────────
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawParticles();
  drawPillars();
  drawBird();

  if (gameRunning) {
    update();
    animFrame = requestAnimationFrame(gameLoop);
  }
}

// Idle animation on menu
function idleLoop() {
  if (gameRunning) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawParticles();
  frame++;
  animFrame = requestAnimationFrame(idleLoop);
}

// ─── Input ──────────────────────────────────────────
function handleFlap(e) {
  e.preventDefault();
  if (gameRunning) flap();
}
canvas.addEventListener('click', handleFlap);
canvas.addEventListener('touchstart', handleFlap, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameRunning) flap();
  }
});

// ─── Confetti ───────────────────────────────────────
function burstConfetti() {
  const colors = ['#f5c542','#9333ea','#e07b00','#d8b4fe','#fff'];
  const wrapper = document.getElementById('gameWrapper');
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const dot = document.createElement('div');
      dot.className = 'confetti-dot';
      const size = 6 + Math.random() * 8;
      dot.style.cssText = `
        width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${20 + Math.random() * 360}px;
        top:${100 + Math.random() * 200}px;
        animation-duration:${0.8+Math.random()*0.6}s;
      `;
      wrapper.appendChild(dot);
      setTimeout(() => dot.remove(), 1500);
    }, i * 40);
  }
}

// ─── Init ───────────────────────────────────────────
document.getElementById('menuBirdImg').src = `images/bird${selectedBird}.png`;
idleLoop();
</script>
</body>
</html>
